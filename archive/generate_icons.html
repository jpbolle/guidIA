<!DOCTYPE html>
<html>
<head>
    <title>Générateur d'icônes GuidIA</title>
</head>
<body>
    <h2>Générateur d'icônes temporaires pour GuidIA</h2>
    <p>Utilisez cet outil pour créer des icônes PNG temporaires.</p>
    
    <canvas id="icon16" width="16" height="16"></canvas>
    <canvas id="icon32" width="32" height="32"></canvas>
    <canvas id="icon48" width="48" height="48"></canvas>
    <canvas id="icon128" width="128" height="128"></canvas>
    
    <div style="margin-top: 20px;">
        <button onclick="generateIcons()">Générer les icônes</button>
        <button onclick="downloadIcons()">Télécharger</button>
    </div>

    <script>
        function generateIcons() {
            const sizes = [16, 32, 48, 128];
            sizes.forEach(size => {
                const canvas = document.getElementById(`icon${size}`);
                const ctx = canvas.getContext('2d');
                
                // Fond gradient
                const gradient = ctx.createLinearGradient(0, 0, size, size);
                gradient.addColorStop(0, '#667eea');
                gradient.addColorStop(1, '#764ba2');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, size, size);
                
                // Icône robot emoji (approximation)
                ctx.fillStyle = 'white';
                ctx.font = `${size * 0.6}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('🤖', size/2, size/2);
            });
        }
        
        function downloadIcons() {
            const sizes = [16, 32, 48, 128];
            sizes.forEach(size => {
                const canvas = document.getElementById(`icon${size}`);
                const link = document.createElement('a');
                link.download = `icon${size}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }
        
        // Générer automatiquement au chargement
        window.onload = generateIcons;
    </script>
</body>
</html>
